
<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treningsplan</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f4f6fb;
}

header{
  background:#0b5d3b;
  color:white;
  text-align:center;
  padding:16px;
}

.wrapper{
  max-width:900px;
  margin:auto;
  padding:16px;
}

.exercise{
  display:grid;
  grid-template-columns:70px 1fr;
  gap:12px;
  margin-bottom:18px;
  align-items:center;
}

.bar{
  height:120px;
  width:50px;
  background:#eee;
  border-radius:10px;
  display:flex;
  align-items:flex-end;
  overflow:hidden;
}

.fill{
  width:100%;
  height:0%;
  background:#2bb673;
  transition:.3s;
}

.mini{
  height:6px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:8px;
}

.mini div{
  height:100%;
  width:0%;
  background:#2bb673;
}

button{
  border:none;
  border-radius:8px;
  padding:6px 10px;
  font-weight:700;
  cursor:pointer;
}

.plus{background:#c8a85b;}
.minus{background:#0b5d3b;color:white;}

#done{
  text-align:center;
  font-size:40px;
  font-weight:900;
  margin-top:20px;
  display:none;
  color:#0b5d3b;
}
</style>
</head>

<body>

<header>
<h2>Treningsplan</h2>
</header>

<div class="wrapper" id="container"></div>

<div id="done">BRA JOBBA!</div>

<script>

const STORAGE="treningsplan_v1";

const exercises={
 situps:{label:"Situps",goal:250,step:10},
 pushups:{label:"Pushups",goal:250,step:10},
 plank:{label:"Planke (min)",goal:10,step:1},
 wallpass:{label:"HARDE pasninger i vegg og ta imot",goal:5000,step:100},
 rebounder:{label:"Sprett mot rebounder",goal:5000,step:100},
 fint:{label:"Overstegsfinter",goal:500,step:10}
};

let state=JSON.parse(localStorage.getItem(STORAGE)||"{}");

if(!state.progress) state.progress={};

Object.keys(exercises).forEach(e=>{
 if(!state.progress[e]) state.progress[e]=0;
});

function save(){
 localStorage.setItem(STORAGE,JSON.stringify(state));
}

function render(){

 container.innerHTML="";

 let allDone=true;

 Object.keys(exercises).forEach(key=>{

  const goal=exercises[key].goal;
  const val=state.progress[key];
  const pct=val/goal*100;

  if(val<goal) allDone=false;

  const div=document.createElement("div");
  div.className="exercise";

  div.innerHTML=`
    <div class="bar">
      <div class="fill" style="height:${pct}%"></div>
    </div>

    <div>
      <strong>${exercises[key].label}</strong>
      <div>${val} / ${goal} (${Math.round(pct)}%)</div>

      <div class="mini">
        <div style="width:${pct}%"></div>
      </div>

      <button class="minus">-${exercises[key].step}</button>
      <button class="plus">+${exercises[key].step}</button>
    </div>
  `;

  const minus=div.querySelector(".minus");
  const plus=div.querySelector(".plus");

  minus.onclick=()=>{
    state.progress[key]=Math.max(0,val-exercises[key].step);
    save();
    render();
  };

  plus.onclick=()=>{
    state.progress[key]=Math.min(goal,val+exercises[key].step);
    save();
    render();
  };

  container.appendChild(div);

 });

 done.style.display=allDone?"block":"none";

}

render();

</script>

</body>
</html>
